<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Log in / Sign up | BookHive 🔮</title>
    <meta name="description" content="BookHive: digital library" />
    <meta name="autor" content="Ivan Miruna Maria" />
    <link rel="stylesheet" href="login_style.css" />
    <link rel="icon" href="resurse/logo.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>

  <body>
    <div class="container">
      <img src="resurse/logo_removedbg.png" alt="BookHive Logo" class="logo" />
      <div class="form-box">
        <h1 id="formTitle">Login to BookHive</h1>

        <form id="loginForm">
          <div class="input-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              placeholder="Enter your email"
              required
            />
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              placeholder="Enter your password"
              required
            />
          </div>

          <button type="submit" class="btn">Login</button>
        </form>

        <p class="toggle-text">
          Don’t have an account?
          <a href="#" id="toggleLink">Sign up here</a>
        </p>
      </div>
    </div>

    <script src="login_script.js"></script>
  </body>
</html>
