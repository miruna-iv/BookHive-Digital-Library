<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Friends 👥</title>
    <meta charset="UTF-8" />
    <meta name="description" content="BookHive: digital library" />
    <meta name="autor" content="Ivan Miruna Maria" />
    <link rel="stylesheet" href="friends_style.css" type="text/css" />
    <link rel="icon" href="resurse/logo.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>

  <body>
    <header>
      <img
        src="resurse/logo_removedbg.png"
        width="100"
        height="100"
        alt="BookHive logo"
      />
      <h1 class="site-name">BookHive</h1>
      <nav>
        <div class="search-container">
          <input type="text" id="searchBar" placeholder="Search books..." />
          <div id="suggestions"></div>
        </div>
          <div class="dropdown">
            <button class="dropbtn">
              <img src="resurse/menu.png" width="18" alt="Menu icon" /> Menu
            </button>

            <div class="dropdown-content">
              <a href="my_profile.html"
                ><img src="resurse/user.png" width="18" alt="User icon" />
                My profile</a
              >
              <a href="homepage.html"
                ><img src="resurse/home_icon.png" width="18" alt="Home Icon" />
                Home
              </a>
              <a href="my_books.html"
                ><img src="resurse/book_icon.png" width="18" alt="Books icon" />
                My books</a
              >
              <a href="news.html"
                ><img src="resurse/news.png" width="18" alt="News icon" />
                News</a
              >
            </div>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <section class="search-section">
        <input
          type="text"
          id="friendSearch"
          placeholder="Search users by username..."
        />
      </section>

      <section id="no-friends" class="no-friends">
        <img src="resurse/bee_reading.png" alt="No friends yet" />
        <h2>You have no friends yet 🐝</h2>
        <p>
          Books are better when shared! Search above or invite someone to join
          BookHive.
        </p>
      </section>

      <section id="friends-list" class="friends-list hidden"></section>
    </main>
    <script src="friends_script.js"></script>
    <script src="global_search.js"></script>
  </body>
</html>
