<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Book Details</title>
    <meta charset="UTF-8" />
    <meta name="description" content="BookHive: digital library" />
    <meta name="autor" content="Ivan Miruna Maria" />
    <style type="text/css"></style>
    <link rel="stylesheet" href="book_style.css" type="text/css" />
    <link rel="icon" href="resurse/logo.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <header>
      <img
        src="resurse/logo_removedbg.png"
        width="100"
        height="100"
        alt="BookHive logo"
      />
      <h1 class="site-name">BookHive</h1>
      <nav>
        <div class="search-container">
          <input type="text" id="searchBar" placeholder="Search books..." />
          <div id="suggestions"></div>
        </div>

        <div class="dropdown">
          <button class="dropbtn">
            <img src="resurse/menu.png" width="18" alt="Menu icon" /> Menu
          </button>

          <div class="dropdown-content">
            <a href="my_profile.html"
              ><img src="resurse/user.png" width="18" alt="User icon" /> My
              profile</a
            >
            <a href="homepage.html"
              ><img src="resurse/home_icon.png" width="18" alt="Home icon" />
              Homepage</a
            >
            <a href="my_books.html"
              ><img src="resurse/book_icon.png" width="18" alt="Books icon" />
              My Books</a
            >
            <a href="news.html"
              ><img src="resurse/news.png" width="18" alt="News icon" /> News</a
            >
            <a href="friends.html"
              ><img src="resurse/friends.png" width="18" alt="Friends icon" />
              Friends</a
            >
          </div>
        </div>
      </nav>
    </header>

    <main class="book-container">
      <div class="left-panel">
        <img
          id="book-cover"
          src="data:image/gif;base64,R0lGODlhAQABAAAAACw="
          alt="Book cover"
        />
        <div class="dropdown-shelf">
          <button class="btn" id="shelf-selector-btn">Add to Shelf ▼</button>
          <div id="shelf-options" class="dropdown-content-shelf"></div>
        </div>
        <button class="btn" id="mark-reading">Mark as Reading</button>
      </div>

      <div class="right-panel">
        <h2 id="book-title"><!--Title--></h2>
        <h3 id="book-author"><!--Author--></h3>
        <p id="book-description"></p>
        <p id="book-year"></p>

        <h3>Genres</h3>
        <ul id="book-genres"></ul>
      </div>
    </main>

    <section class="similar-books">
      <h2>You may also like</h2>
      <div id="similar-container"></div>
    </section>

    <script src="book_script.js"></script>
    <script src="global_search.js"></script>
  </body>
</html>
